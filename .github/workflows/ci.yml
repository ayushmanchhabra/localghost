name: ci

on:
  push:
    branches: ["*"]
  pull_request:
    branches: ["*"]

concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true

jobs:
  web:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.1.7
      - name: Setup Node.js
        uses: actions/setup-volta@4.2.1
        with:
          volta-version: '1.1.1'
          node-version: 22
      - name: Install dependencies
        run: npm install
      - name: Web Tests
        run: npm run e2e:vite
