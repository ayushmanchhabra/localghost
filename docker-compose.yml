services:
  vite:
    build:
      context: .
      dockerfile: Dockerfile.vite
    ports:
      - "5173:5173"
  nw:
    build:
      context: .
      dockerfile: Dockerfile.nw
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix
    environment:
      - DISPLAY=$DISPLAY
  ns:
    build:
      context: .
      dockerfile: Dockerfile.ns
    ports:
      - "3000:3000"
